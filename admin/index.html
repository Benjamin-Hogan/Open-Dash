<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pi Dashboard — Admin</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/admin.css" />
</head>
<body>
  <header class="topbar">
    <h1>Pi Dashboard <span class="muted">admin</span></h1>
    <div class="actions">
      <span id="version" class="badge">v?</span>
      <button id="btn-layout" class="btn">Layout</button>
      <button id="btn-keys" class="btn">API keys</button>
      <button id="btn-displays" class="btn">Displays</button>
      <button id="btn-backups" class="btn">Backups</button>
      <button id="btn-slideshow" class="btn">Slideshow</button>
      <button id="btn-alerts" class="btn">Alerts</button>
      <button id="btn-test-alert" class="btn">Test alert</button>
      <button id="btn-refresh" class="btn">Force refresh</button>
      <button id="btn-clear" class="btn">Clear cache</button>
    </div>
  </header>
  <div class="lan-banner" role="status">
    Admin is open on the LAN with no login — do not expose it beyond your trusted network.
  </div>

  <nav id="page-bar" class="page-bar"></nav>

  <main class="layout">
    <section class="panel">
      <div class="panel-head">
        <h2>Layout</h2>
        <div class="panel-head-actions">
          <span class="muted small" id="canvas-hint">Drag to move · drag corner to resize</span>
          <button id="btn-preview" class="btn small">Preview</button>
          <button id="btn-add" class="btn primary small">+ Add widget</button>
        </div>
      </div>
      <div id="canvas" class="layout-canvas"></div>
      <div id="preview-wrap" class="preview-wrap hidden"><iframe id="preview-frame" title="Live page preview"></iframe></div>
      <div id="widget-list" class="widget-list"></div>
    </section>
    <section id="editor" class="panel editor hidden"></section>
  </main>

  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
  <script type="module" src="/admin.js"></script>
</body>
</html>
