services:
  dashboard:
    build: .
    image: pi-dashboard:3
    restart: unless-stopped
    ports:
      - "8081:8081"  # admin
      - "8082:8082"  # dashboard
    environment:
      # Optional — you can also set these from the admin "API keys" panel.
      # An env var here takes precedence and locks that key in the UI.
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      OCTOPRINT_API_KEY: ${OCTOPRINT_API_KEY:-}
    volumes:
      # Named volume persists config + backups + secrets across rebuilds.
      # (A named volume avoids Docker Desktop's network-drive bind-mount issues.)
      - dashboard-data:/app/data
      # Optional live-reload mounts for development (see command override below).
      - ./server:/app/server
      - ./web:/app/web
      - ./admin:/app/admin

    # Production default: run the dual-port app directly.
    # For local hot-reload, override command to:
    #   ["watchfiles", "--target-type", "command", "python -m server.run", "server", "web", "admin"]
    command: ["python", "-m", "server.run"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  dashboard-data:
