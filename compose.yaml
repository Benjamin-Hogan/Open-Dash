services:
  dashboard:
    build: .
    image: pi-dashboard:3
    restart: unless-stopped
    ports:
      - "8081:8081"  # admin
      - "8082:8082"  # dashboard
    environment:
      # Optional — you can also set these from the admin "API keys" panel.
      # An env var here takes precedence and locks that key in the UI.
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      OCTOPRINT_API_KEY: ${OCTOPRINT_API_KEY:-}
      HOST: ${HOST:-0.0.0.0}
      ADMIN_PORT: ${ADMIN_PORT:-8081}
      DASHBOARD_PORT: ${DASHBOARD_PORT:-8082}
    volumes:
      # Named volume persists config + backups + secrets across rebuilds.
      # (A named volume avoids Docker Desktop's network-drive bind-mount issues.)
      - dashboard-data:/app/data
    # Production default: no file watcher. For live code reload during development,
    # bind-mount source and override the command, e.g.:
    #   docker compose run --rm -v ./server:/app/server -v ./web:/app/web -v ./admin:/app/admin \
    #     dashboard watchfiles --target-type command "python -m server.run" server web admin
    command: ["python", "-m", "server.run"]

volumes:
  dashboard-data:
